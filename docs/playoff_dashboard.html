<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MEGA PLAYOFFS Season 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-dark:#0c1430;
  --bg-card:#132042;
  --bg-card-hover:#1a2d5a;
  --gold:#f0b931;
  --silver:#c0c0c0;
  --white:#f0f4ff;
  --muted:#7b8fb0;
  --afc-color:#d32f2f;
  --nfc-color:#1565c0;
  --connector:#3a5280;
  --field-green:#1a3a1a;
  --font:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}
html{min-height:100%;overflow-x:hidden}
body{overflow-x:hidden}
body{
  font-family:var(--font);
  background:var(--bg-dark);
  color:var(--white);
  min-height:100vh;
  position:relative;
}
body::after{
  content:'';
  position:fixed;
  bottom:0;left:0;right:0;
  height:60px;
  background:linear-gradient(to top,var(--field-green) 0%,transparent 100%);
  pointer-events:none;
  z-index:0;
}
.page{position:relative;z-index:1;padding:20px 16px 80px}

.header{
  text-align:center;
  padding:24px 0 12px;
}
.header h1{
  font-size:clamp(1.8rem,4vw,3rem);
  font-weight:900;
  letter-spacing:4px;
  text-transform:uppercase;
  background:linear-gradient(135deg,var(--gold) 0%,#fff 50%,var(--gold) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
}
.header .sub{
  font-size:clamp(0.8rem,1.5vw,1rem);
  color:var(--muted);
  letter-spacing:6px;
  text-transform:uppercase;
  margin-top:4px;
}
.conf-labels{
  display:flex;
  justify-content:space-between;
  max-width:1400px;
  margin:18px auto 0;
  padding:0 30px;
}
.conf-label{
  font-size:clamp(1rem,2vw,1.4rem);
  font-weight:800;
  letter-spacing:3px;
  text-transform:uppercase;
  padding:6px 24px;
  border-radius:6px;
}
.conf-label.afc{background:var(--afc-color);color:#fff}
.conf-label.nfc{background:var(--nfc-color);color:#fff}

.bracket-wrapper{
  max-width:1400px;
  margin:24px auto 0;
  overflow-x:auto;
}
.bracket{
  display:grid;
  grid-template-columns:minmax(170px,1.2fr) minmax(160px,1fr) minmax(120px,0.8fr) minmax(150px,1fr) minmax(120px,0.8fr) minmax(160px,1fr) minmax(170px,1.2fr);
  grid-template-rows:auto repeat(6,auto);
  gap:0;
  min-width:900px;
  padding:0 12px;
}
.round-header-cell{
  text-align:center;
  font-size:11px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  padding:0 6px 12px;
  white-space:nowrap;
}
.cell{
  padding:6px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.round-header{display:none}

.matchup-card{
  background:var(--bg-card);
  border:1px solid #1e3a6e;
  border-radius:10px;
  padding:0;
  cursor:pointer;
  transition:all 0.2s ease;
  overflow:hidden;
  position:relative;
}
.matchup-card:hover{
  background:var(--bg-card-hover);
  border-color:var(--gold);
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(240,185,49,0.15);
}
.matchup-card.completed{border-color:var(--gold)}
.matchup-card.pending{opacity:0.5;cursor:default}
.vote-fire{
  font-size:11px;
  flex-shrink:0;
  margin-left:2px;
  line-height:1;
}
.matchup-card.pending:hover{transform:none;border-color:#1e3a6e;background:var(--bg-card);box-shadow:none}

.team-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  position:relative;
}
.team-row+.team-row{border-top:1px solid #1e3a6e}
.team-row.winner{background:rgba(240,185,49,0.08)}

.seed-badge{
  width:22px;height:22px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
  flex-shrink:0;
}
.seed-badge.afc{background:var(--afc-color);color:#fff}
.seed-badge.nfc{background:var(--nfc-color);color:#fff}

.team-logo{
  width:32px;height:32px;
  border-radius:4px;
  background:#0d1a30;
  flex-shrink:0;
  object-fit:contain;
}
.team-name{
  font-size:13px;
  font-weight:700;
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.team-record{
  font-size:11px;
  color:var(--muted);
  flex-shrink:0;
}
.team-score{
  font-size:15px;
  font-weight:800;
  color:var(--gold);
  min-width:24px;
  text-align:right;
  flex-shrink:0;
}

.bye-card{
  background:linear-gradient(135deg,var(--bg-card) 0%,#1a2d5a 100%);
  border:2px dashed var(--gold);
  border-radius:10px;
  padding:12px 10px;
  text-align:center;
  transition:transform 0.2s ease,box-shadow 0.2s ease;
}
.bye-card:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(240,185,49,0.12);
}
.bye-card .bye-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:2px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:6px;
}
.bye-team{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.bye-team .team-logo{width:36px;height:36px}
.bye-team .team-name{font-size:14px;flex:none}

.tbd-card{
  background:var(--bg-card);
  border:1px solid #1e3a6e;
  border-radius:10px;
  padding:20px 10px;
  text-align:center;
  opacity:0.4;
}
.tbd-card .tbd-text{
  font-size:14px;
  font-weight:700;
  letter-spacing:3px;
  color:var(--muted);
}

.connector-right .team-row::after{
  content:'';
  position:absolute;
  right:-7px;top:50%;
  width:7px;height:2px;
  background:var(--connector);
}
.connector-left .team-row::after{
  content:'';
  position:absolute;
  left:-7px;top:50%;
  width:7px;height:2px;
  background:var(--connector);
}

.sb-card{
  background:linear-gradient(135deg,#1a2040 0%,#2a1a40 100%);
  border:2px solid var(--gold);
  border-radius:14px;
  padding:16px 12px;
  text-align:center;
  transition:transform 0.2s ease,box-shadow 0.2s ease;
}
.sb-card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(240,185,49,0.2);
}
.sb-card .sb-logo{
  font-size:28px;
  margin-bottom:4px;
}
.sb-card .sb-title{
  font-size:12px;
  font-weight:800;
  letter-spacing:3px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:8px;
}

.game-time{
  text-align:center;
  font-size:10px;
  font-weight:600;
  color:var(--muted);
  padding:4px 10px 6px;
  border-top:1px solid #1e3a6e;
  letter-spacing:0.5px;
}
.spacer{height:40px}
.spacer-sm{height:20px}

.win-pct-mini-wrap{
  display:flex;
  justify-content:center;
  padding:4px 10px 0;
}
.win-pct-label{
  font-size:9px;
  font-weight:700;
  color:var(--gold);
}
.win-pct-mini{
  display:flex;
  height:3px;
  border-radius:2px;
  overflow:hidden;
  margin:0 10px 6px;
}
.win-pct-mini .bar-home{background:var(--afc-color);transition:width 0.3s}
.win-pct-mini .bar-away{background:var(--nfc-color);transition:width 0.3s}

.matchup-card[data-conf="AFC"] .win-pct-mini .bar-home{background:var(--afc-color)}
.matchup-card[data-conf="AFC"] .win-pct-mini .bar-away{background:#e57373}
.matchup-card[data-conf="NFC"] .win-pct-mini .bar-home{background:var(--nfc-color)}
.matchup-card[data-conf="NFC"] .win-pct-mini .bar-away{background:#64b5f6}

.loading{
  text-align:center;
  padding:100px 20px;
  color:var(--muted);
  font-size:18px;
}

#modal-overlay{
  opacity:0;
  transition:opacity 0.25s ease;
}
#modal-overlay.visible{opacity:1}
#modal-content{
  transform:translateY(30px);
  opacity:0;
  transition:transform 0.3s ease,opacity 0.3s ease;
}
#modal-overlay.visible #modal-content{
  transform:translateY(0);
  opacity:1;
}

.analytics-collapsed{max-height:calc(1.7em * 5);transition:max-height 0.4s ease}
.analytics-expanded{max-height:5000px;transition:max-height 0.6s ease}
#analytics-toggle{transition:opacity 0.2s}
#analytics-toggle:hover{background:rgba(240,185,49,0.1)}

.modal-matchup-header{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.modal-team-box{text-align:center}
.modal-team-logo{width:56px;height:56px;border-radius:6px}
.modal-team-name{font-weight:800;margin-top:4px}
.modal-team-info{font-size:12px;color:var(--muted)}
.modal-vs{font-size:20px;font-weight:800;color:var(--gold)}
.win-prob-section{margin:12px 0;text-align:center}
.win-prob-row{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px}
.win-prob-bar{display:flex;height:8px;border-radius:4px;overflow:hidden}
.analytics-section{margin:20px 0}
.analytics-header{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;text-align:center}
.analytics-wrap{position:relative}
.analytics-text{background:#0d1a30;border-radius:10px;padding:16px 18px;font-size:13px;line-height:1.7;color:var(--white);white-space:pre-wrap;word-wrap:break-word;border-left:3px solid var(--gold);overflow:hidden}
.analytics-fade{position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,transparent,#0d1a30);border-radius:0 0 10px 10px;pointer-events:none}
.analytics-toggle-btn{display:block;margin:8px auto 0;background:none;border:1px solid var(--gold);color:var(--gold);padding:5px 18px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px}
.stat-category-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;padding-left:4px;border-left:3px solid var(--gold)}
.stats-category-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat-card{background:#0d1a30;border-radius:8px;padding:10px 12px}
.stat-card-header{text-align:center;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
.stat-card-values{display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:800;margin-bottom:6px}
.stat-delta{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:rgba(240,185,49,0.15);color:var(--gold)}
.stat-bar-wrap{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:2px}
.modal-players-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.player-card{background:#0d1a30;border-radius:8px;padding:10px}
.player-pos-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.player-name{font-size:13px;font-weight:700}
.player-stats{font-size:11px;color:var(--muted)}
.h2h-section{margin:20px 0}
.h2h-header{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:4px;text-align:center}
.h2h-summary{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px}
.h2h-game{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#0d1a30;border-radius:6px;margin-bottom:4px;font-size:12px}
.h2h-week{color:var(--muted);min-width:55px}
.h2h-score{font-weight:800;color:var(--gold);min-width:50px;text-align:center}

.vote-section{margin:20px 0}
.vote-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;text-align:center}
.vote-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px}
.vote-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:#0d1a30;border:2px solid transparent;border-radius:10px;
  padding:12px 18px;cursor:pointer;transition:all 0.2s ease;min-width:120px;
}
.vote-btn:hover{border-color:var(--gold);background:#132042}
.vote-btn.voted{border-color:var(--gold);background:rgba(240,185,49,0.1)}
.vote-btn img{width:48px;height:48px;border-radius:6px}
.vote-btn .vote-team-name{font-size:13px;font-weight:700;color:var(--white)}
.vote-btn .vote-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.vote-bar-wrap{margin:0 auto;max-width:400px}
.vote-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;background:#1e3a6e}
.vote-bar .bar-home{background:var(--afc-color);transition:width 0.4s ease}
.vote-bar .bar-away{background:var(--nfc-color);transition:width 0.4s ease}
.vote-counts{display:flex;justify-content:space-between;font-size:12px;margin-top:4px}
.vote-counts span{color:var(--muted)}
.vote-counts .count-bold{font-weight:700;color:var(--white)}

#bracket-mobile{display:none}

.mobile-conf-section{margin-bottom:24px}
.mobile-conf-header{
  font-size:clamp(1rem,2vw,1.3rem);
  font-weight:800;
  letter-spacing:3px;
  text-transform:uppercase;
  padding:8px 16px;
  border-radius:8px;
  text-align:center;
  margin-bottom:12px;
}
.mobile-conf-header.afc{background:var(--afc-color);color:#fff}
.mobile-conf-header.nfc{background:var(--nfc-color);color:#fff}
.mobile-round-header{
  text-align:center;
  font-size:11px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  padding:12px 0 8px;
  border-top:1px solid #1e3a6e;
  margin-top:4px;
}
.mobile-round-header:first-child{border-top:none;margin-top:0}
.mobile-card-slot{
  max-width:420px;
  margin:0 auto 10px;
}
.mobile-sb-section{
  margin:28px 0;
  text-align:center;
}
.mobile-sb-divider{
  height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:20px 0;
}

@media(max-width:960px){
  .bracket-wrapper{display:none}
  .conf-labels{display:none}
  #bracket-mobile{display:block;max-width:500px;margin:16px auto 0;padding:0 8px}
  .connector-right .team-row::after,
  .connector-left .team-row::after{display:none}

  #modal-content{ margin:10px 8px; padding:16px 12px; max-width:100%; border-radius:12px; }
  .stat-card{ padding:8px 10px; }
  .stat-card-header{ font-size:10px; }
  .stat-card-values{ font-size:16px; }
  .stat-delta{ font-size:8px; padding:1px 5px; }
}

@media(max-width:480px){
  .page{padding:12px 6px 80px}
  .header h1{letter-spacing:2px}
  .header .sub{letter-spacing:3px;font-size:0.7rem}
  .team-logo{width:28px;height:28px}
  .team-name{font-size:12px}
  .team-record{font-size:10px}
  .seed-badge{width:20px;height:20px;font-size:10px}
  .team-row{padding:10px;gap:8px;min-height:48px}
  .bye-team{gap:10px}
  .bye-team .team-logo{width:32px;height:32px}
  .mobile-card-slot{max-width:100%}
  .vote-btn{min-width:100px;padding:10px 12px}
  .vote-btn img{width:40px;height:40px}

  #modal-content{ margin:6px 4px; padding:12px 8px; }
  .analytics-text{ font-size:12px; padding:12px 14px; line-height:1.6; }
  .modal-matchup-header{ gap:10px; }
  .modal-team-logo{ width:44px; height:44px; }
  .stat-card{ padding:6px 8px; }
  .stat-card-values{ font-size:14px; }
  .stat-category-title{ font-size:10px; }
  .stats-category-grid{ grid-template-columns:1fr; }
  .modal-players-grid{ grid-template-columns:1fr; }
  .vote-row{ gap:8px; }
  .h2h-game{ font-size:11px; }
  .h2h-week{ min-width:45px; font-size:10px; }
  .h2h-score{ min-width:44px; font-size:12px; }
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>MEGA PLAYOFFS Season 3</h1>
    <div class="sub">Season 3 &mdash; NFL Playoff Bracket</div>
  </div>
  <div class="conf-labels">
    <span class="conf-label afc">AFC</span>
    <span class="conf-label nfc">NFC</span>
  </div>
  <div class="bracket-wrapper">
    <div class="bracket" id="bracket">
      <div class="loading" style="grid-column:1/-1">Loading bracket data&hellip;</div>
    </div>
  </div>
  <div id="bracket-mobile"></div>
</div>

<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;overflow-y:auto;padding:20px" role="dialog" aria-modal="true">
  <div id="modal-content" style="max-width:700px;margin:40px auto;background:var(--bg-card);border:1px solid #1e3a6e;border-radius:14px;padding:24px;position:relative">
    <button id="modal-close" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
(function(){
  var LOGO_CDN = 'https://cdn.neonsportz.com/teamlogos/256/';
  var JSONBIN_ID = '69cbb01436566621a8663829';
  var JSONBIN_KEY = '$2a$10$NHFv3H4QqdDeWEQ9p.P8QONEGTGZ/fJjP1zMkLmZAfUdzd.Q9118K';
  var JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID;
  var DATA = null;
  var votesData = null;
  var currentMatchupId = null;

  const getUserId = () => {
    let id = localStorage.getItem('playoff_user_id');
    if(!id){
      id = crypto.randomUUID ? crypto.randomUUID() : 'u-'+Math.random().toString(36).slice(2)+Date.now().toString(36);
      localStorage.setItem('playoff_user_id', id);
    }
    return id;
  };

  const getLocalVotes = () => {
    try{ return JSON.parse(localStorage.getItem('playoff_votes')||'{}'); }catch(e){ return {}; }
  };

  const setLocalVote = (matchupId, team) => {
    const v = getLocalVotes();
    v[matchupId] = team;
    localStorage.setItem('playoff_votes', JSON.stringify(v));
  };

  const fetchVotes = () => {
    return fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Access-Key': JSONBIN_KEY }
    })
    .then(r => r.json())
    .then(d => {
      votesData = (d && d.record) ? d.record : { votes: {} };
      if(!votesData.votes) votesData.votes = {};
      return votesData;
    })
    .catch(() => {
      votesData = { votes: {} };
      return votesData;
    });
  };

  let reconciled = false;
  const reconcileLocalVotes = () => {
    if(reconciled) return;
    reconciled = true;
    const localVotes = getLocalVotes();
    const userId = getUserId();
    let needsUpdate = false;
    if(!votesData) votesData = { votes: {} };
    if(!votesData.votes) votesData.votes = {};
    Object.keys(localVotes).forEach(matchupId => {
      if(!votesData.votes[matchupId]) votesData.votes[matchupId] = {};
      if(votesData.votes[matchupId][userId] !== localVotes[matchupId]){
        votesData.votes[matchupId][userId] = localVotes[matchupId];
        needsUpdate = true;
      }
    });
    if(needsUpdate){
      const payload = { votes: votesData.votes };
      fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_KEY },
        body: JSON.stringify(payload)
      }).catch(e => console.error('Reconcile save failed', e));
    }
  };

  const submitVote = (matchupId, team) => {
    const userId = getUserId();
    if(!votesData) votesData = { votes: {} };
    if(!votesData.votes) votesData.votes = {};
    if(!votesData.votes[matchupId]) votesData.votes[matchupId] = {};
    votesData.votes[matchupId][userId] = team;

    setLocalVote(matchupId, team);
    updateVoteUI(matchupId);
    updateBracketVotes();
    updateMobileBracketVotes();

    fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Access-Key': JSONBIN_KEY }
    })
    .then(r => r.json())
    .then(d => {
      const serverData = (d && d.record) ? d.record : { votes: {} };
      if(!serverData.votes) serverData.votes = {};
      if(!serverData.votes[matchupId]) serverData.votes[matchupId] = {};
      serverData.votes[matchupId][userId] = team;
      votesData = serverData;
      const payload = { votes: serverData.votes };
      return fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_KEY },
        body: JSON.stringify(payload)
      });
    })
    .catch(e => console.error('Vote save failed', e));
  };

  const getVoteCounts = (matchupId, homeTeam, awayTeam) => {
    if(!votesData || !votesData.votes || !votesData.votes[matchupId]) return { home: 0, away: 0 };
    const mv = votesData.votes[matchupId];
    let home = 0, away = 0;
    Object.keys(mv).forEach(uid => {
      if(mv[uid] === homeTeam) home++;
      else if(mv[uid] === awayTeam) away++;
    });
    return { home, away };
  };

  const getUserVote = matchupId => {
    if(votesData && votesData.votes && votesData.votes[matchupId]){
      const v = votesData.votes[matchupId][getUserId()];
      if(v) return v;
    }
    return getLocalVotes()[matchupId] || null;
  };

  const voteEmoji = count => {
    if(count<=0) return '';
    if(count===1) return '\u{1F525}';
    if(count<=3) return '\u{1F525}'.repeat(Math.min(count,3));
    return '\u{1F525}'.repeat(3)+' '+count;
  };

  const updateBracketVotes = () => {
    document.querySelectorAll('.matchup-card[data-matchup-id]').forEach(card => {
      card.querySelectorAll('.vote-fire').forEach(f => f.remove());
      const mid = card.getAttribute('data-matchup-id');
      const m = findMatchup(mid);
      if(!m||!m.home) return;
      const counts = getVoteCounts(mid, m.home, m.away);
      if(counts.home+counts.away===0) return;
      const rows = card.querySelectorAll('.team-row');
      if(rows.length<2) return;
      if(counts.home>0){
        const s = document.createElement('span');
        s.className = 'vote-fire';
        s.textContent = voteEmoji(counts.home);
        rows[0].appendChild(s);
      }
      if(counts.away>0){
        const s2 = document.createElement('span');
        s2.className = 'vote-fire';
        s2.textContent = voteEmoji(counts.away);
        rows[1].appendChild(s2);
      }
    });
  };

  const updateMobileBracketVotes = updateBracketVotes;

  const updateVoteUI = matchupId => {
    const m = findMatchup(matchupId);
    if(!m||!m.home) return;
    const counts = getVoteCounts(matchupId, m.home, m.away);
    const total = counts.home + counts.away;
    const homePct = total > 0 ? Math.round(counts.home / total * 100) : 0;
    const awayPct = total > 0 ? 100 - homePct : 0;
    const userVote = getUserVote(matchupId);

    const barHome = document.getElementById('vote-bar-home');
    const barAway = document.getElementById('vote-bar-away');
    if(barHome) barHome.style.width = (total > 0 ? homePct : 0) + '%';
    if(barAway) barAway.style.width = (total > 0 ? awayPct : 0) + '%';

    const countEl = document.getElementById('vote-counts');
    if(countEl){
      countEl.innerHTML = `<span><span class="count-bold">${counts.home}</span> voted ${m.home}</span>`
        + `<span><span class="count-bold">${counts.away}</span> voted ${m.away}</span>`;
    }

    const btnHome = document.getElementById('vote-btn-home');
    const btnAway = document.getElementById('vote-btn-away');
    if(btnHome){
      btnHome.className = 'vote-btn' + (userVote === m.home ? ' voted' : '');
      btnHome.querySelector('.vote-label').textContent = userVote === m.home ? 'YOUR PICK' : 'PREDICT';
    }
    if(btnAway){
      btnAway.className = 'vote-btn' + (userVote === m.away ? ' voted' : '');
      btnAway.querySelector('.vote-label').textContent = userVote === m.away ? 'YOUR PICK' : 'PREDICT';
    }
  };

  const logoUrl = team => {
    if(!DATA||!DATA.teams[team]) return '';
    return LOGO_CDN + DATA.teams[team].logoId + '.png';
  };

  const teamConf = team => {
    if(!DATA||!DATA.teams[team]) return 'AFC';
    return DATA.teams[team].conference;
  };

  function renderTeamRow(teamName, seed, score, isWinner, conf){
    const t = DATA.teams[teamName];
    const confClass = (conf||'AFC').toLowerCase();
    return `
      <div class="team-row${isWinner ? ' winner' : ''}">
        <span class="seed-badge ${confClass}">${seed}</span>
        <img class="team-logo" src="${logoUrl(teamName)}" alt="${teamName}" onerror="this.style.display='none'">
        <span class="team-name">${teamName}</span>
        <span class="team-record">${t ? t.wins + '-' + t.losses : ''}</span>
        ${score !== null ? `<span class="team-score">${score}</span>` : ''}
      </div>
    `;
  }

  function renderMatchupCard(m, conf){
    if(!m.home && !m.away && !m.byeTeam){
      return '<div class="tbd-card"><div class="tbd-text">TBD</div></div>';
    }
    if(m.byeTeam && !m.home && !m.away){
      return '<div class="tbd-card"><div class="tbd-text">TBD</div></div>';
    }
    const status = m.status || 'scheduled';
    const isCompleted = status === 'completed';
    const isPending = status === 'pending';
    const winPct = m.homeWinPct;

    let html = `
      <div class="matchup-card${isCompleted ? ' completed' : ''}${isPending ? ' pending' : ''}" 
           data-matchup-id="${m.matchupId}" 
           data-conf="${conf}">
    `;

    if(winPct !== null && !isPending){
      const homePct = Math.round(winPct * 100);
      const awayPct = 100 - homePct;
      const diff = Math.abs(homePct - awayPct);
      const favLabel = (homePct >= awayPct ? m.home : m.away) + ' +' + diff + '%';
      html += `
        <div class="win-pct-mini-wrap">
          <span class="win-pct-label" style="color:var(--gold)">${favLabel}</span>
        </div>
        <div class="win-pct-mini">
          <div class="bar-home" style="width:${homePct}%"></div>
          <div class="bar-away" style="width:${awayPct}%"></div>
        </div>
      `;
    }

    const homeWinner = isCompleted && m.winner === m.home;
    const awayWinner = isCompleted && m.winner === m.away;
    html += renderTeamRow(m.home, m.homeSeed, m.homeScore, homeWinner, conf);
    html += renderTeamRow(m.away, m.awaySeed, m.awayScore, awayWinner, conf);
    
    if(m.gameTime){
      html += `<div class="game-time">\u{1F551} ${m.gameTime}</div>`;
    }
    
    html += '</div>';
    return html;
  }

  function renderByeCard(teamName, conf){
    const t = DATA.teams[teamName];
    const confClass = conf.toLowerCase();
    return `
      <div class="bye-card">
        <div class="bye-label">\u{1F3C6} 1st Round Bye</div>
        <div class="bye-team">
          <span class="seed-badge ${confClass}">1</span>
          <img class="team-logo" src="${logoUrl(teamName)}" alt="${teamName}" onerror="this.style.display='none'">
          <span class="team-name">${teamName}</span>
          <span class="team-record">${t ? t.wins + '-' + t.losses : ''}</span>
        </div>
      </div>
    `;
  }

  function renderChampOrSBCard(m, conf){
    if(!m.home){
      return '<div class="tbd-card"><div class="tbd-text">TBD</div></div>';
    }
    return renderMatchupCard(m, conf);
  }

  function renderSuperBowl(sb){
    if(sb.home){
      return `
        <div class="sb-card">
          <div class="sb-logo">\u{1F3C8}</div>
          <div class="sb-title">Super Bowl</div>
          ${renderMatchupCard(sb, 'SB')}
        </div>
      `;
    }
    return `
      <div class="sb-card">
        <div class="sb-logo">\u{1F3C8}</div>
        <div class="sb-title">Super Bowl</div>
        <div class="tbd-card"><div class="tbd-text">TBD</div></div>
      </div>
    `;
  }

  const gc = (col, row, rspan) => `grid-column:${col};grid-row:${row}${rspan ? `/span ${rspan}` : ''}`;

  function buildBracket(){
    const b = DATA.bracket;
    const el = document.getElementById('bracket');
    const afcWC = b.AFC.wildcard;
    const nfcWC = b.NFC.wildcard;
    const afcDiv = b.AFC.divisional;
    const nfcDiv = b.NFC.divisional;
    const afcChamp = b.AFC.championship;
    const nfcChamp = b.NFC.championship;
    const sb = DATA.super_bowl;

    el.innerHTML = `
      <div class="round-header-cell" style="${gc(1,1)}">Wild Card</div>
      <div class="round-header-cell" style="${gc(2,1)}">Divisional</div>
      <div class="round-header-cell" style="${gc(3,1)}">Conference</div>
      <div class="round-header-cell" style="${gc(4,1)}">&nbsp;</div>
      <div class="round-header-cell" style="${gc(5,1)}">Conference</div>
      <div class="round-header-cell" style="${gc(6,1)}">Divisional</div>
      <div class="round-header-cell" style="${gc(7,1)}">Wild Card</div>

      <div class="cell" style="${gc(1,2)}">${renderMatchupCard(afcWC[0],'AFC')}</div>
      <div class="cell" style="${gc(2,2)}">${renderByeCard(b.AFC.byeTeam,'AFC')}</div>
      <div class="cell" style="${gc(1,3)}">${renderMatchupCard(afcWC[1],'AFC')}</div>
      <div class="cell" style="${gc(2,3)}">${renderChampOrSBCard(afcDiv[0],'AFC')}</div>
      <div class="cell" style="grid-column:3;grid-row:3/5;display:flex;align-items:center;justify-content:center;padding:6px">${renderChampOrSBCard(afcChamp,'AFC')}</div>
      <div class="cell" style="${gc(1,4)}">${renderMatchupCard(afcWC[2],'AFC')}</div>
      <div class="cell" style="${gc(2,4)}">${renderChampOrSBCard(afcDiv[1],'AFC')}</div>
      
      <div class="cell" style="grid-column:4;grid-row:2/6;display:flex;align-items:center;justify-content:center;padding:6px">${renderSuperBowl(sb)}</div>
      
      <div class="cell" style="grid-column:5;grid-row:3/5;display:flex;align-items:center;justify-content:center;padding:6px">${renderChampOrSBCard(nfcChamp,'NFC')}</div>
      <div class="cell" style="${gc(7,2)}">${renderMatchupCard(nfcWC[0],'NFC')}</div>
      <div class="cell" style="${gc(6,2)}">${renderByeCard(b.NFC.byeTeam,'NFC')}</div>
      <div class="cell" style="${gc(7,3)}">${renderMatchupCard(nfcWC[1],'NFC')}</div>
      <div class="cell" style="${gc(6,3)}">${renderChampOrSBCard(nfcDiv[0],'NFC')}</div>
      <div class="cell" style="${gc(7,4)}">${renderMatchupCard(nfcWC[2],'NFC')}</div>
      <div class="cell" style="${gc(6,4)}">${renderChampOrSBCard(nfcDiv[1],'NFC')}</div>
    `;

    el.querySelectorAll('.matchup-card:not(.pending)').forEach(card => {
      card.addEventListener('click', () => openModal(card.getAttribute('data-matchup-id')));
    });
  }

  function buildMobileBracket(){
    const b = DATA.bracket;
    const el = document.getElementById('bracket-mobile');

    const mobileRoundCards = (conf, roundName, matchups, byeTeam) => {
      let h = `<div class="mobile-round-header">${roundName}</div>`;
      if(byeTeam) h += `<div class="mobile-card-slot">${renderByeCard(byeTeam, conf)}</div>`;
      matchups.forEach(m => h += `<div class="mobile-card-slot">${renderChampOrSBCard(m, conf)}</div>`);
      return h;
    };

    el.innerHTML = `
      <div class="mobile-conf-section">
        <div class="mobile-conf-header afc">AFC Conference</div>
        ${mobileRoundCards('AFC','Wild Card', b.AFC.wildcard, null)}
        ${mobileRoundCards('AFC','Divisional', b.AFC.divisional, b.AFC.byeTeam)}
        ${mobileRoundCards('AFC','Conference Championship', [b.AFC.championship], null)}
      </div>
      <div class="mobile-sb-divider"></div>
      <div class="mobile-sb-section">
        <div class="mobile-card-slot">${renderSuperBowl(DATA.super_bowl)}</div>
      </div>
      <div class="mobile-sb-divider"></div>
      <div class="mobile-conf-section">
        <div class="mobile-conf-header nfc">NFC Conference</div>
        ${mobileRoundCards('NFC','Wild Card', b.NFC.wildcard, null)}
        ${mobileRoundCards('NFC','Divisional', b.NFC.divisional, b.NFC.byeTeam)}
        ${mobileRoundCards('NFC','Conference Championship', [b.NFC.championship], null)}
      </div>
    `;

    el.querySelectorAll('.matchup-card:not(.pending)').forEach(card => {
      card.addEventListener('click', () => openModal(card.getAttribute('data-matchup-id')));
    });
  }

  const findMatchup = id => {
    let all = [];
    ['AFC','NFC'].forEach(c => {
      const br = DATA.bracket[c];
      all = all.concat(br.wildcard);
      all = all.concat(br.divisional);
      all.push(br.championship);
    });
    all.push(DATA.super_bowl);
    return all.find(m => m.matchupId === id) || null;
  };

  const findH2H = (teamA, teamB) => {
    const keys = Object.keys(DATA.head_to_head);
    const matchKey = keys.find(k => k.indexOf(teamA) >= 0 && k.indexOf(teamB) >= 0);
    return matchKey ? DATA.head_to_head[matchKey] : [];
  };

  function openModal(matchupId){
    const m = findMatchup(matchupId);
    if(!m||!m.home) return;
    const home = DATA.teams[m.home];
    const away = DATA.teams[m.away];
    if(!home||!away) return;
    currentMatchupId = matchupId;

    const homePct = m.homeWinPct!==null ? Math.round(m.homeWinPct*100) : 50;
    const awayPct = 100 - homePct;

    let html = `
      <div style="text-align:center;margin-bottom:16px">
        <div class="modal-matchup-header">
          <div class="modal-team-box">
            <img src="${logoUrl(m.home)}" class="modal-team-logo" onerror="this.style.display='none'">
            <div class="modal-team-name">${m.home}</div>
            <div class="modal-team-info">#${m.homeSeed} seed &bull; ${home.wins}-${home.losses}</div>
          </div>
          <div class="modal-vs">VS</div>
          <div class="modal-team-box">
            <img src="${logoUrl(m.away)}" class="modal-team-logo" onerror="this.style.display='none'">
            <div class="modal-team-name">${m.away}</div>
            <div class="modal-team-info">#${m.awaySeed} seed &bull; ${away.wins}-${away.losses}</div>
          </div>
        </div>

        <div class="win-prob-section">
          <div class="win-prob-row">
            <span>${m.home} ${homePct}%</span>
            <span style="color:var(--muted)">Win Probability</span>
            <span>${awayPct}% ${m.away}</span>
          </div>
          <div class="win-prob-bar">
            <div style="width:${homePct}%;background:var(--afc-color)"></div>
            <div style="width:${awayPct}%;background:var(--nfc-color)"></div>
          </div>
        </div>
      </div>
    `;

    const analyticsText = DATA.analytics && DATA.analytics[matchupId];
    if(analyticsText){
      html += `
        <div class="analytics-section">
          <div class="analytics-header">\u{1F4CA} Аналитика матча</div>
          <div class="analytics-wrap">
            <div id="analytics-body" class="analytics-text analytics-collapsed">${analyticsText}</div>
            <div id="analytics-fade" class="analytics-fade"></div>
          </div>
          <button id="analytics-toggle" class="analytics-toggle-btn">ЧИТАТЬ ДАЛЕЕ ▼</button>
        </div>
      `;
    }

    const statCategories = [
      {
        title: 'OVERALL',
        stats: [
          {label:'OVR',h:home.ovrRating,a:away.ovrRating},
          {label:'ELO',h:home.elo,a:away.elo},
          {label:'TO Diff',h:home.tODiff||0,a:away.tODiff||0},
        ]
      },
      {
        title: 'SCORING',
        stats: [
          {label:'Pts/G',h:home.ptsFor,a:away.ptsFor},
          {label:'Pts Allowed',h:home.ptsAgainst,a:away.ptsAgainst,invert:true},
          {label:'Pass TDs',h:home.passTDs||0,a:away.passTDs||0},
          {label:'Rush TDs',h:home.rushTDs||0,a:away.rushTDs||0},
        ]
      },
      {
        title: 'OFFENSE',
        stats: [
          {label:'Pass Yds',h:home.offPassYds,a:away.offPassYds},
          {label:'Rush Yds',h:home.offRushYds,a:away.offRushYds},
          {label:'Total Yds',h:home.offTotalYds,a:away.offTotalYds},
        ]
      },
      {
        title: 'DEFENSE',
        stats: [
          {label:'Def Pass Yds',h:home.defPassYds,a:away.defPassYds,invert:true},
          {label:'Def Rush Yds',h:home.defRushYds,a:away.defRushYds,invert:true},
          {label:'Def TDs',h:home.defTDs||0,a:away.defTDs||0},
          {label:'Sacks',h:home.defSacks||0,a:away.defSacks||0},
          {label:'INTs',h:home.defINTs||0,a:away.defINTs||0},
        ]
      },
      {
        title: 'TURNOVERS',
        stats: [
          {label:'Forced Fum',h:home.defForcedFum||0,a:away.defForcedFum||0},
          {label:'Rec Fum',h:home.defFumRec||0,a:away.defFumRec||0},
          {label:'Pass INTs',h:home.passINTs||0,a:away.passINTs||0,invert:true},
          {label:'Rush Fum',h:home.rushFumbles||0,a:away.rushFumbles||0,invert:true},
        ]
      }
    ];

    function renderStatCard(s, homeTeam, awayTeam) {
      const total = (Math.abs(s.h) + Math.abs(s.a)) || 1;
      let hPct, aPct;
      if (s.h === 0 && s.a === 0) { hPct = 50; aPct = 50; }
      else { hPct = Math.max(8, Math.min(92, Math.round(s.h / total * 100))); aPct = 100 - hPct; }
      const hBetter = s.invert ? s.h < s.a : s.h > s.a;
      const aBetter = s.invert ? s.a < s.h : s.a > s.h;
      const tied = s.h === s.a;
      const diff = Math.abs(s.h - s.a);
      const diffStr = s.label === 'ELO' ? diff.toFixed(1) : (Number.isInteger(diff) ? diff : diff.toFixed(1));

      return `
        <div class="stat-card">
          <div class="stat-card-header">${s.label}</div>
          <div class="stat-card-values">
            <span style="display:flex;align-items:center;gap:4px;color:${hBetter?'var(--gold)':tied?'var(--white)':'var(--muted)'}">
              <img src="${logoUrl(homeTeam)}" style="width:18px;height:18px;border-radius:3px;flex-shrink:0" onerror="this.style.display='none'">
              ${formatStat(s.h)}
            </span>
            ${!tied ? `<span class="stat-delta">+${diffStr}</span>` : `<span class="stat-delta" style="background:rgba(123,143,176,0.15);color:var(--muted)">EVEN</span>`}
            <span style="display:flex;align-items:center;gap:4px;color:${aBetter?'var(--gold)':tied?'var(--white)':'var(--muted)'}">
              ${formatStat(s.a)}
              <img src="${logoUrl(awayTeam)}" style="width:18px;height:18px;border-radius:3px;flex-shrink:0" onerror="this.style.display='none'">
            </span>
          </div>
          <div class="stat-bar-wrap">
            <div style="width:${hPct}%;background:${hBetter?'var(--gold)':'#3a5280'};border-radius:2px;transition:width 0.3s"></div>
            <div style="width:${aPct}%;background:${aBetter?'var(--gold)':'#3a5280'};border-radius:2px;transition:width 0.3s"></div>
          </div>
        </div>
      `;
    }

    html += `
      <div style="margin:20px 0">
        <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;text-align:center">Team Stats Comparison</div>
        ${statCategories.map(cat => `
          <div style="margin-bottom:14px">
            <div class="stat-category-title">${cat.title}</div>
            <div class="stats-category-grid">
              ${cat.stats.map(s => renderStatCard(s, m.home, m.away)).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;

    html += `
      <div style="margin:20px 0">
        <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;text-align:center">Best Players</div>
        <div class="modal-players-grid">
          ${['QB','RB','WR','DEF','DB','LB','DL'].map(pos => {
            const hp = home.topPlayers[pos];
            const ap = away.topPlayers[pos];
            if(!hp||!ap) return '';
            return `
              <div class="player-card">
                <div class="player-pos-label">${m.home} ${pos}</div>
                <div class="player-name">${hp.name}</div>
                <div class="player-stats">${playerStatLine(pos,hp)} &bull; <span style="color:var(--gold)">${hp.ovr} OVR</span></div>
              </div>
              <div class="player-card">
                <div class="player-pos-label">${m.away} ${pos}</div>
                <div class="player-name">${ap.name}</div>
                <div class="player-stats">${playerStatLine(pos,ap)} &bull; <span style="color:var(--gold)">${ap.ovr} OVR</span></div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;

    const h2h = findH2H(m.home, m.away);
    if(h2h.length>0){
      let homeWins=0, awayWins=0;
      h2h.forEach(g => { if(g.winner===m.home) homeWins++; else awayWins++; });
      html += `
        <div class="h2h-section">
          <div class="h2h-header">Head-to-Head History</div>
          <div class="h2h-summary">${m.home} ${homeWins} &mdash; ${awayWins} ${m.away} (${h2h.length} games)</div>
          ${h2h.map(g => {
            const seasonLabel = 'S'+(g.season+1);
            const weekLabel = 'Wk '+(g.week+1);
            let leftScore, rightScore;
            if(g.home===m.home){ leftScore=g.homeScore; rightScore=g.awayScore; }
            else { leftScore=g.awayScore; rightScore=g.homeScore; }
            const leftWon = g.winner===m.home;
            const rightWon = g.winner===m.away;
            const winColor = '#4caf50';
            return `
              <div class="h2h-game">
                <span class="h2h-week">${seasonLabel} ${weekLabel}</span>
                <span style="flex:1;font-weight:${leftWon?'700':'400'};color:${leftWon?winColor:'inherit'}">${m.home}${leftWon?' \u2705':''}</span>
                <span class="h2h-score">${leftScore} - ${rightScore}</span>
                <span style="flex:1;text-align:right;font-weight:${rightWon?'700':'400'};color:${rightWon?winColor:'inherit'}">${m.away}${rightWon?' \u2705':''}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    const userVote = getUserVote(matchupId);
    const counts = getVoteCounts(matchupId, m.home, m.away);
    const totalVotes = counts.home + counts.away;
    const vHomePct = totalVotes > 0 ? Math.round(counts.home / totalVotes * 100) : 0;
    const vAwayPct = totalVotes > 0 ? 100 - vHomePct : 0;

    html += `
      <div class="vote-section">
        <div class="vote-title">Community Prediction</div>
        <div class="vote-row">
          <div class="vote-btn${userVote===m.home?' voted':''}" id="vote-btn-home">
            <img src="${logoUrl(m.home)}" alt="${m.home}" onerror="this.style.display='none'">
            <span class="vote-team-name">${m.home}</span>
            <span class="vote-label">${userVote===m.home?'YOUR PICK':'PREDICT'}</span>
          </div>
          <div style="font-size:16px;font-weight:800;color:var(--muted)">OR</div>
          <div class="vote-btn${userVote===m.away?' voted':''}" id="vote-btn-away">
            <img src="${logoUrl(m.away)}" alt="${m.away}" onerror="this.style.display='none'">
            <span class="vote-team-name">${m.away}</span>
            <span class="vote-label">${userVote===m.away?'YOUR PICK':'PREDICT'}</span>
          </div>
        </div>
        <div class="vote-bar-wrap">
          <div class="vote-bar">
            <div class="bar-home" id="vote-bar-home" style="width:${totalVotes>0?vHomePct:0}%"></div>
            <div class="bar-away" id="vote-bar-away" style="width:${totalVotes>0?vAwayPct:0}%"></div>
          </div>
          <div class="vote-counts" id="vote-counts">
            <span><span class="count-bold">${counts.home}</span> voted ${m.home}</span>
            <span><span class="count-bold">${counts.away}</span> voted ${m.away}</span>
          </div>
        </div>
      </div>
    `;

    document.getElementById('modal-body').innerHTML = html;

    document.getElementById('vote-btn-home').addEventListener('click', () => submitVote(matchupId, m.home));
    document.getElementById('vote-btn-away').addEventListener('click', () => submitVote(matchupId, m.away));

    const toggleBtn = document.getElementById('analytics-toggle');
    if(toggleBtn){
      toggleBtn.addEventListener('click', () => {
        const body = document.getElementById('analytics-body');
        const fade = document.getElementById('analytics-fade');
        const expanded = body.classList.contains('analytics-expanded');
        if(expanded){
          body.classList.remove('analytics-expanded');
          body.classList.add('analytics-collapsed');
          fade.style.display = '';
          toggleBtn.textContent = 'ЧИТАТЬ ДАЛЕЕ \u25BC';
        } else {
          body.classList.remove('analytics-collapsed');
          body.classList.add('analytics-expanded');
          fade.style.display = 'none';
          toggleBtn.textContent = 'СВЕРНУТЬ \u25B2';
        }
      });
    }

    const overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'block';
    overlay.offsetHeight;
    overlay.classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  const formatStat = v => {
    if(typeof v==='number'){
      if(v>=1000) return v.toLocaleString();
      if(v%1!==0) return v.toFixed(1);
    }
    return v;
  };

  const playerStatLine = (pos, p) => {
    if(pos==='QB') return `${p.yards} yds, ${p.tds} TD, ${p.ints} INT`;
    if(pos==='RB') return `${p.yards} yds, ${p.tds} TD, ${p.avgYpc} YPC`;
    if(pos==='WR') return `${p.yards} yds, ${p.tds} TD, ${p.catches} rec`;
    if(['DEF','DB','LB','DL'].includes(pos)) return `${p.sacks} sck, ${p.ints} INT, ${p.tackles} tkl`;
    return '';
  };

  const closeModal = () => {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('visible');
    setTimeout(() => {
      overlay.style.display = 'none';
      document.body.style.overflow = '';
    }, 300);
    currentMatchupId = null;
  };

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if(e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModal();
  });

  fetch('data/playoff_dashboard.json')
    .then(r => r.json())
    .then(d => {
      DATA = d;
      buildBracket();
      buildMobileBracket();
      return fetchVotes().then(() => { reconcileLocalVotes(); updateBracketVotes(); updateMobileBracketVotes(); });
    })
    .catch(err => {
      document.getElementById('bracket').innerHTML =
        `<div class="loading" style="grid-column:1/-1;color:#e57373">Failed to load data. Make sure to serve via HTTP (python3 -m http.server).</div>`;
      console.error(err);
    });
})();
</script>
</body>
</html>
